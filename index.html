<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAKAW - Campus Path Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="/styles/style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <header class="topbar">
          <div class="brand">
            <span class="brand-icon"><i class="fa-solid fa-map"></i></span>
            <div class="brand-text">
              <div class="brand-title">LAKAW</div>
              <div class="brand-subtitle">Find your path</div>
            </div>
          </div>
          <button id="btnExit" class="ghost-btn" type="button" title="Clear everything">
            <i class="fa-solid fa-right-from-bracket"></i>
          </button>
        </header>

        <nav class="sidebar-nav">
          <button class="nav-item active" data-target="build">
            <i class="fa-solid fa-hammer"></i> Build
          </button>
          <button class="nav-item" data-target="route">
            <i class="fa-solid fa-route"></i> Route
          </button>
        </nav>

        <div class="sidebar-content">
          <section class="panel left tab-content active" id="build">
            <div class="panel-head">
              <div class="panel-title">
                <i class="fa-solid fa-diagram-project"></i> Graph Builder
              </div>
              <div class="panel-actions">
                <button id="btnResetGraph" class="ghost-btn" type="button" title="Remove all">
                  <i class="fa-solid fa-eraser"></i>
                </button>
              </div>
            </div>

            <div class="panel-body">
              <div class="card">
                <div class="card-title">
                  <i class="fa-solid fa-location-dot"></i> Add Location
                </div>
                <div class="row">
                  <input id="locationName" type="text" placeholder="Location name" />
                  <button id="btnAddLocation" class="primary-btn" type="button">
                    <i class="fa-solid fa-plus"></i>
                  </button>
                </div>
              </div>

              <div class="card">
                <div class="card-title">
                  <i class="fa-solid fa-link"></i> Add Connection
                </div>
                <div class="row two">
                  <label class="field">
                    <span class="label" style="font-size: 0.7rem;">From</span>
                    <select id="fromSelect"></select>
                  </label>
                  <label class="field">
                    <span class="label" style="font-size: 0.7rem;">To</span>
                    <select id="toSelect"></select>
                  </label>
                </div>
                <div class="row" style="align-items: center;">
                  <input id="weightInput" type="number" min="1" step="1" value="1" placeholder="W" style="width:70px;" disabled />
                  <label class="field checkbox-field" style="display:flex; align-items:center; gap:5px; color:var(--muted); font-size:11px; cursor:pointer;" title="Auto-calculate using node coordinates">
                    <input type="checkbox" id="autoWeightCheck" checked /> Auto
                  </label>
                  <button id="btnAddConnection" class="primary-btn" type="button" style="margin-left:auto;">
                    <i class="fa-solid fa-route"></i>
                  </button>
                </div>
              </div>

              <div class="card">
                <div id="adjacencyList" class="table"></div>
              </div>
            </div>
          </section>

          <section class="panel right tab-content" id="route">
            <div class="panel-head">
              <div class="panel-title">
                <i class="fa-solid fa-compass-drafting"></i> Path Finder
              </div>
              <button id="btnClearResults" class="ghost-btn" type="button" title="Clear results">
                <i class="fa-solid fa-trash"></i>
              </button>
            </div>

            <div class="panel-body">
              <div class="card">
                <div class="row two">
                  <select id="startSelect"></select>
                  <select id="destSelect"></select>
                </div>
                <div class="row path-actions">
                  <button id="btnPathMode" class="secondary-btn toggle-btn active" type="button" title="Toggle Short/Long Path">
                    <i class="fa-solid fa-bolt"></i> <span>Short Path</span>
                  </button>
                </div>
              </div>

              <div class="results">
                <div id="connectivityOutput" class="result-text">-</div>
                <div class="result-grid">
                  <div id="shortOutput" class="result-text small">-</div>
                  <div id="longOutput" class="result-text small">-</div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </aside>

      <main class="main-content">
        <div class="map-controls">
          <div class="stats">
            <div class="stat"><span class="label">Nodes:</span> <span id="locationsCount">0</span></div>
            <div class="stat"><span class="label">Edges:</span> <span id="connectionsCount">0</span></div>
          </div>
          <div class="instructions">Drag nodes to rearrange. Connections update automatically.</div>
        </div>
        <div id="mapContainer" class="map-container">
          <svg id="mapSvg" width="100%" height="100%" viewBox="0 0 1000 1000">
            <defs>
              <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="20" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="var(--brand)" />
              </marker>
            </defs>
            <g id="edgesLayer"></g>
            <g id="tempLayer"></g>
            <g id="nodesLayer"></g>
          </svg>
        </div>

        <!-- Floating Canvas Toolbar -->
        <div id="floatingToolbar" class="floating-toolbar">
          <button id="btnFloatingDelete" class="floating-btn" title="Delete element">
            <i class="fa-solid fa-trash"></i> <span id="btnFloatingDeleteText">Delete Location</span>
          </button>
        </div>
      </main>
    </div>    <!-- Custom Modal -->
    <div id="customModal" class="modal-overlay">
      <div class="modal-box">
        <div id="modalMessage" class="modal-message"></div>
        <div class="modal-actions">
          <button id="modalBtnCancel" class="secondary-btn">Cancel</button>
          <button id="modalBtnConfirm" class="primary-btn accent" style="color: #000;">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Prompt Modal -->
    <div id="promptModal" class="modal-overlay">
      <div class="modal-box">
        <div id="promptMessage" class="modal-message"></div>
        <input id="promptInput" type="text" class="prompt-input" />
        <div class="modal-actions" style="margin-top: 20px;">
          <button id="promptBtnCancel" class="secondary-btn">Cancel</button>
          <button id="promptBtnConfirm" class="primary-btn accent" style="color: #000;">Confirm</button>
        </div>
      </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="scripts/script.js"></script>
  </body>
</html>
